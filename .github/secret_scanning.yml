# Detection fixtures, vendored rule patterns, and replacement templates contain
# intentional, fake secret-shaped strings used to exercise (and document)
# bleep's own scanners. Exclude them from secret scanning so they don't raise
# alerts. These are not real credentials.
paths-ignore:
  - "fixtures/**"
  - "rules/**"
  - "tests/**"
  - "docs/**"
  - "README.md"
  - "src/bin/bench_detect.rs"
  - "src/replacement/replacers.rs"
