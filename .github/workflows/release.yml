name: release
# Fires on every push to main. cocogitto inspects commits since the last
# tag, decides the next semver, edits the version files, commits, tags,
# and pushes. The tag push triggers build.yml which produces the actual
# binaries + GitHub Release.
#
# Skipped when:
#  - the head commit was made by this workflow (`chore(version): X.Y.Z`)
#    — avoids infinite loops
#  - no commits since last tag qualify for a bump (no feat/fix/perf/!)
#
# Requires repo secret BLEEP_AI_TOKEN: a fine-grained PAT with
# `Contents: read/write` so the push-back fires build.yml (GITHUB_TOKEN
# pushes deliberately do NOT trigger other workflows).

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  # Never two release jobs at once; queue them so version numbers stay sequential.
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    # Loop-guard: cocogitto's bump commit starts with "chore(version):" —
    # don't react to our own push-back.
    if: "!startsWith(github.event.head_commit.message, 'chore(version):')"
    steps:
      - name: Checkout (full history, push via PAT)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use the PAT so the subsequent git push fires build.yml.
          # With GITHUB_TOKEN, the tag push would NOT trigger the build workflow
          # (GitHub's anti-loop guard).
          token: ${{ secrets.BLEEP_AI_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@example.com"

      - name: Install Python (used by cog.toml's tauri.conf.json bump hook)
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Rust toolchain (used by cog.toml's cargo update hooks)
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cocogitto
        uses: taiki-e/install-action@v2
        with:
          tool: cocogitto

      - name: Lint commits since last tag (warn only)
        # The commit-msg hook (.githooks/commit-msg) is the real enforcement,
        # run on every local commit. Here we only WARN: a single historical
        # non-conventional commit must never deadlock releases — and it would,
        # because the gate blocks the very release whose tag would move the
        # check range past the bad commit. cog bump ignores non-conventional
        # commits for version calculation anyway.
        run: cog check --from-latest-tag || echo "::warning::non-conventional commit(s) since last tag — see log above; release continues"

      - name: Decide whether to release
        id: decide
        run: |
          # cog bump --dry-run prints "Bumping from X.Y.Z to A.B.C" when there's
          # something to release, otherwise something like "No commit found to
          # bump current version". Parse it to gate the real bump.
          set -o pipefail
          out=$(cog bump --auto --dry-run 2>&1 || true)
          echo "$out"
          if grep -qi "bumping\|next version" <<<"$out"; then
            echo "release=true" >> "$GITHUB_OUTPUT"
          else
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "Nothing to release — head commit had no feat:/fix:/perf:/BREAKING."
          fi

      - name: Bump, commit, tag
        if: steps.decide.outputs.release == 'true'
        run: cog bump --auto

      - name: Push commit + tag
        if: steps.decide.outputs.release == 'true'
        run: |
          git push origin main
          git push origin --tags
