# cargo-deny configuration — license & advisory policy for the Rust dependency
# tree. Run with:  cargo deny check
#
# Not enforced in CI by default; install locally with `cargo install cargo-deny`
# and run `cargo deny check licenses` before publishing a release.

[licenses]
# Permissive licenses we accept across the dependency graph. bleep itself is
# MIT; everything it links must be MIT/Apache-2.0-compatible.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "Unlicense",
    "OpenSSL",
]
confidence-threshold = 0.8

# Note: the bundled detection *pattern data* (not a crate) adapted from
# secrets-patterns-db is CC BY-SA 4.0 — see THIRD-PARTY-NOTICES.md. cargo-deny
# only inspects crate licenses, so that obligation is tracked in docs, not here.

[bans]
multiple-versions = "warn"
wildcards = "allow"

[advisories]
# Fail on known security advisories in dependencies.
yanked = "warn"

[sources]
# Allow the pinned hudsucker fork (MIT/Apache-2.0 upstream).
unknown-git = "allow"
unknown-registry = "deny"
