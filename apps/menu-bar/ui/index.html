<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Bleep</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="brand">Bl<span class="redact">ee</span>p</div>
    <nav>
      <a href="#dashboard" data-route="dashboard">
        <span class="dot"></span>Dashboard
      </a>
      <a href="#rules" data-route="rules">
        <span class="dot"></span>Rules
      </a>
      <a href="#perf" data-route="perf">
        <span class="dot"></span>Perf
      </a>
      <a href="#settings" data-route="settings">
        <span class="dot"></span>Settings
      </a>
    </nav>
    <div class="sidebar-footer">
      <div id="connection" class="status">connecting…</div>
      <div class="dim small">v0.1.0</div>
    </div>
  </aside>

  <main class="content" id="content"></main>

  <!-- ── route templates ─────────────────────────────────────────────── -->

  <template id="route-dashboard">
    <header>
      <h1>Dashboard</h1>
      <div class="dim">live redaction activity</div>
    </header>

    <section class="cards">
      <div class="card card-hero">
        <div class="card-label">today</div>
        <div class="card-value" id="m-today">0</div>
      </div>
      <div class="card">
        <div class="card-label">last 7 days</div>
        <div class="card-value" id="m-7d">0</div>
      </div>
      <div class="card">
        <div class="card-label">last 30 days</div>
        <div class="card-value" id="m-30d">0</div>
      </div>
      <div class="card card-total">
        <div class="card-label">all time</div>
        <div class="card-value" id="m-total">0</div>
      </div>
    </section>

    <section class="panel">
      <h2>By category</h2>
      <div id="categories" class="bar-chart">
        <div class="empty">no redactions yet</div>
      </div>
    </section>

    <section class="panel live">
      <h2>Live tail <span class="dim" id="tail-counter"></span></h2>
      <div class="tail-filters">
        <input
          type="search"
          id="tail-search"
          class="tail-search"
          placeholder="search rule_id, fake, original, uri…"
          autocomplete="off"
          spellcheck="false"
        />
        <div class="tail-chips" id="tail-chips" role="group" aria-label="filter by category">
          <button type="button" class="chip active" data-cat="all">all</button>
          <button type="button" class="chip cat-pii" data-cat="pii">pii</button>
          <button type="button" class="chip cat-secret" data-cat="secret">secret</button>
          <button type="button" class="chip cat-infra" data-cat="infra">infra</button>
        </div>
        <span class="dim tail-match-count" id="tail-match-count"></span>
      </div>
      <div id="tail" class="tail">
        <div class="empty">waiting for the next redaction…</div>
      </div>
    </section>
  </template>

  <template id="route-rules">
    <header>
      <h1>Rules</h1>
      <div class="dim">most-triggered rules across all time</div>
    </header>
    <section class="panel">
      <div id="rules-list" class="bar-chart tall">
        <div class="empty">loading…</div>
      </div>
    </section>
  </template>

  <template id="route-drilldown">
    <header class="dd-header">
      <div>
        <h1 id="dd-title">Redactions</h1>
        <div class="dim" id="dd-subtitle">historical drill-down</div>
      </div>
      <button type="button" id="dd-back" class="chip dd-back" title="back to dashboard">← back</button>
    </header>
    <section class="panel">

      <!-- toolbar row 1: search + view toggle + count -->
      <div class="dd-toolbar-row">
        <input type="search" id="dd-search" class="tail-search"
               placeholder="search original / fake / rule_id…"
               autocomplete="off" spellcheck="false" />
        <div class="dd-view-toggle">
          <button type="button" id="dd-view-grouped" class="chip active">grouped</button>
          <button type="button" id="dd-view-flat"    class="chip">flat</button>
        </div>
        <span class="dim tail-match-count" id="dd-count"></span>
      </div>

      <!-- toolbar row 2: date range -->
      <div class="dd-toolbar-row dd-date-row">
        <span class="dd-date-label">from</span>
        <input type="datetime-local" id="dd-date-from" class="dd-dateinput" />
        <span class="dd-date-label">to</span>
        <input type="datetime-local" id="dd-date-to"   class="dd-dateinput" />
        <div class="dd-quick-dates" id="dd-quick-dates">
          <button type="button" class="chip" data-preset="today">today</button>
          <button type="button" class="chip" data-preset="7d">7 days</button>
          <button type="button" class="chip" data-preset="30d">30 days</button>
          <button type="button" class="chip active" data-preset="all">all time</button>
        </div>
      </div>

      <!-- main content area — class drives grouped/flat visibility -->
      <div class="redacted-table-wrap" id="dd-wrap">

        <!-- grouped view (default) -->
        <div id="dd-grouped-list" class="dd-grouped-list"></div>

        <!-- flat table view -->
        <table class="redacted-table dd-table dd-flat-table">
          <thead>
            <tr class="dd-headrow">
              <th class="dd-col-time">Time</th>
              <th class="dd-col-cat">Category</th>
              <th class="dd-col-rule">Rule</th>
              <th class="dd-col-sub">Subcategory</th>
              <th class="dd-col-orig">Original</th>
              <th class="dd-col-fake">Fake</th>
            </tr>
            <tr class="dd-filterrow">
              <th><input type="search" data-col="time"        class="dd-colfilter" placeholder="filter…" autocomplete="off" spellcheck="false" /></th>
              <th><input type="search" data-col="category"    class="dd-colfilter" placeholder="filter…" autocomplete="off" spellcheck="false" /></th>
              <th><input type="search" data-col="rule"        class="dd-colfilter" placeholder="filter…" autocomplete="off" spellcheck="false" /></th>
              <th><input type="search" data-col="subcategory" class="dd-colfilter" placeholder="filter…" autocomplete="off" spellcheck="false" /></th>
              <th><input type="search" data-col="original"    class="dd-colfilter" placeholder="filter…" autocomplete="off" spellcheck="false" /></th>
              <th><input type="search" data-col="fake"        class="dd-colfilter" placeholder="filter…" autocomplete="off" spellcheck="false" /></th>
            </tr>
          </thead>
          <tbody id="dd-body"></tbody>
        </table>

        <div id="dd-sentinel" class="dim" style="padding:8px; text-align:center;">loading…</div>
      </div>
    </section>
  </template>

  <template id="route-perf">
    <header class="dd-header">
      <div>
        <h1>Perf</h1>
        <div class="dim" id="perf-subtitle">gateway hot-path span timings · auto-refresh 1s</div>
      </div>
      <div class="perf-actions">
        <label class="chip perf-toggle" title="pause auto-refresh">
          <input type="checkbox" id="perf-pause" /> pause
        </label>
        <button type="button" id="perf-reset" class="chip" title="zero counters on the gateway">reset</button>
      </div>
    </header>
    <section class="panel">
      <div class="tail-filters">
        <input type="search" id="perf-search" class="tail-search"
               placeholder="filter span name (regex ok)…"
               autocomplete="off" spellcheck="false" />
        <span class="dim tail-match-count" id="perf-count"></span>
      </div>
      <div class="redacted-table-wrap">
        <table class="redacted-table perf-table">
          <thead>
            <tr>
              <th class="perf-col-name" data-sort="name">Span</th>
              <th class="perf-col-num" data-sort="count">Count</th>
              <th class="perf-col-num" data-sort="avg_ms">Avg ms</th>
              <th class="perf-col-num" data-sort="min_ms">Min ms</th>
              <th class="perf-col-num" data-sort="max_ms">Max ms</th>
              <th class="perf-col-num" data-sort="total_ms">Total ms</th>
              <th class="perf-col-bar">Share</th>
            </tr>
          </thead>
          <tbody id="perf-body"></tbody>
        </table>
      </div>
    </section>
  </template>

  <template id="route-settings">
    <header>
      <h1>Settings</h1>
      <div class="dim">connection and runtime info</div>
    </header>
    <section class="panel">
      <h2>Gateway</h2>
      <div class="kv">
        <div>Stats endpoint</div><div id="s-stats-port" class="mono">—</div>
        <div>Events endpoint</div><div id="s-events-port" class="mono">—</div>
        <div>Status</div><div id="s-status">—</div>
      </div>
    </section>
    <section class="panel">
      <h2>Database</h2>
      <p class="settings-note">
        <span class="settings-note-icon">⚠</span>
        Destructive — clears local state only. No network calls.
      </p>
      <div class="settings-actions">
        <button type="button" id="s-reset-stats" class="btn btn-danger">Reset redaction history</button>
        <button type="button" id="s-reset-perf" class="btn btn-danger">Reset perf counters</button>
        <button type="button" id="s-reset-dict" class="btn btn-danger" title="wipe the persistent original→fake dictionary so future requests mint fresh fakes">Reset fake dictionary</button>
      </div>
      <div id="s-reset-status" class="dim small settings-status"></div>
    </section>
    <section class="panel">
      <h2>About</h2>
      <div class="kv">
        <div>Version</div><div class="mono">0.1.0</div>
        <div>Build</div><div class="mono">debug</div>
      </div>
    </section>
  </template>

  <script src="app.js"></script>
</body>
</html>
