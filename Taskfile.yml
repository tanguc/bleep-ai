# https://taskfile.dev
version: "3"

vars:
  BIN: bleep-gateway
  TUI: bleep-tui
  MENUBAR: bleep-menu-bar

tasks:
  default:
    desc: list available tasks
    silent: true
    cmds:
      - task --list

  build:
    desc: build release binary
    sources:
      - src/**/*.rs
      - Cargo.toml
    generates:
      - target/release/{{.BIN}}
    cmds:
      - cargo build --release

  bindings:
    desc: regenerate TS bindings (crates/bleep-events/bindings/) from Rust types via ts-rs
    cmds:
      - cargo test --package bleep-events --quiet
      - echo "wrote crates/bleep-events/bindings/*.ts"

  rules:
    desc: regenerate rules/combined.yaml from vendor sources
    sources:
      - rules/vendor/**/*
      - rules/EXCLUSIONS.yaml
      - src/rule_pipeline.rs
    generates:
      - rules/combined.yaml
      - rules/patterns-test-fixtures.yaml
    cmds:
      - cargo run --bin build-rules

  rules:dev:
    desc: regenerate rules with a small subset (fast proxy startup for iteration)
    cmds:
      - cargo run --bin build-rules -- --limit 30

  run:
    desc: "run gateway (debug build, DEV ports: proxy 9390 / events 9391-9400 / stats 9490-9499). Curated 100-rule set for fast startup. Override with RUST_LOG=… task run"
    env:
      BLEEP_DEV: "1"
      BLEEP_LOG_REQUESTS: "1"
      BLEEP_LOG_PATH: /tmp
      BLEEP_SPAWN_GATEWAY: "false"
      # dev startup: load the static curated 100-rule set instead of the
      # embedded 401-rule full set. ~75% faster regex-compile pass.
      BLEEP_RULES_FILE: rules/combined-100.yaml
    cmds:
      - pkill -f "target/.*/{{.BIN}}( |$)" || true
      - cargo run --bin {{.BIN}} -- {{.CLI_ARGS}} 2>&1 | tee /tmp/bleep-gateway.log

  run:trace:
    desc: "run gateway with FULL verbose TLS/proxy debug (DEV ports). Use when actually debugging handshakes."
    env:
      BLEEP_DEV: "1"
      RUST_LOG: "debug,bleep_gateway=trace,rustls=debug,hyper=debug,hyper_util=debug,hudsucker=debug,h2=info"
      BLEEP_LOG_REQUESTS: "1"
      BLEEP_LOG_PATH: /tmp
      BLEEP_SPAWN_GATEWAY: "false"
      BLEEP_RULES_FILE: rules/combined-100.yaml
    cmds:
      - pkill -f "target/.*/{{.BIN}}( |$)" || true
      - cargo run --bin {{.BIN}} -- {{.CLI_ARGS}} 2>&1 | tee /tmp/bleep-gateway.log

  run:full:
    desc: "run gateway (debug build, DEV ports) with the FULL 401-rule set (slower startup)"
    env:
      BLEEP_DEV: "1"
      RUST_LOG: debug
      BLEEP_LOG_REQUESTS: "1"
      BLEEP_LOG_PATH: /tmp
      BLEEP_SPAWN_GATEWAY: "false"
    cmds:
      - cargo run --bin {{.BIN}} -- {{.CLI_ARGS}}

  run:release:
    desc: "run gateway (release build) on PROD ports (proxy 9190 / events 9191-9200 / stats 9290-9299). Use this to mimic the installed Bleep.app."
    env:
      RUST_LOG: info
    cmds:
      - cargo run --release --bin {{.BIN}} -- {{.CLI_ARGS}}

  tui:
    desc: run the TUI monitor
    cmds:
      - cargo run --bin {{.TUI}}

  menu-bar:
    desc: stop any running menu-bar/ui-server then start fresh in dev mode. attaches to an existing gateway on :9190 if one is running (e.g. via `task run`); otherwise spawns its own.
    cmds:
      - pkill -f "target/.*/{{.MENUBAR}}( |$)" 2>/dev/null || true
      - pkill -f "http.server 1420" 2>/dev/null || true
      - ./apps/menu-bar/run-dev.sh

  menu-bar:logs:
    desc: tail the spawned-gateway log (menu-bar redirects the gateway's stdio to these files so it survives menu-bar exit)
    cmds:
      - tail -F /tmp/bleep-gateway.out.log /tmp/bleep-gateway.err.log

  menu-bar:observe:
    desc: run the menu-bar app in observe-only mode (does not spawn the gateway — start it yourself with `task run` or `task run:release`)
    dir: apps/menu-bar/src-tauri
    cmds:
      - cargo run

  menu-bar:build:
    desc: build the menu-bar app (debug)
    dir: apps/menu-bar/src-tauri
    cmds:
      - cargo build

  menu-bar:stop:
    desc: kill the menu-bar app only (leaves the gateway running). use `task gateway:stop` or `task stop:all` to also take down the gateway.
    cmds:
      - pkill -f "target/.*/{{.MENUBAR}}( |$)" || true

  gateway:stop:
    desc: kill the gateway only (leaves the menu-bar running). port files are removed only after the proxy ports are confirmed free.
    cmds:
      - pkill -f "target/.*/{{.BIN}}( |$)" || true
      - |
        # only purge port files if NO gateway is still listening on a known proxy
        # port. earlier versions blindly rm'd these and orphaned a still-running
        # gateway from the menu-bar app (Bleep.app showed "disconnected" while
        # the gateway was actually healthy).
        if ! lsof -nP -iTCP:9190 -sTCP:LISTEN >/dev/null 2>&1 \
          && ! lsof -nP -iTCP:9390 -sTCP:LISTEN >/dev/null 2>&1; then
          rm -f /tmp/bleep-stats.port /tmp/bleep-events.port /tmp/bleep-stats-dev.port /tmp/bleep-events-dev.port
        else
          echo "[task] a gateway is still listening — keeping port files in place"
        fi

  stop:all:
    desc: kill both menu-bar and gateway, and clean port files (dev + prod) only if no gateway survived the pkill.
    cmds:
      - pkill -f "target/.*/{{.MENUBAR}}( |$)" || true
      - pkill -f "target/.*/{{.BIN}}( |$)"     || true
      - sleep 0.3
      - |
        if ! lsof -nP -iTCP:9190 -sTCP:LISTEN >/dev/null 2>&1 \
          && ! lsof -nP -iTCP:9390 -sTCP:LISTEN >/dev/null 2>&1; then
          rm -f /tmp/bleep-stats.port /tmp/bleep-events.port /tmp/bleep-stats-dev.port /tmp/bleep-events-dev.port
        else
          echo "[task] a gateway is still listening (pkill missed it?) — keeping port files in place"
        fi

  stats:tail:
    desc: tail timing/metrics lines from the running gateway — [stats_server] HTTP timings + [perf] markers. assumes `task run` (or run:trace) is logging into /tmp/bleep-gateway.log
    cmds:
      - tail -F /tmp/bleep-gateway.log | grep --line-buffered -E "\[stats_server\]|\[perf\]"

  perf:
    desc: snapshot the gateway's hot-path timing registry. Prefers the dev stats port file; falls back to prod.
    vars:
      PORT:
        sh: cat /tmp/bleep-stats-dev.port 2>/dev/null || cat /tmp/bleep-stats.port 2>/dev/null || echo 9290
    cmds:
      - 'curl -s http://127.0.0.1:{{.PORT}}/perf | jq -r ''(["name","count","avg_ms","min_ms","max_ms","total_ms"] | @tsv), (.[] | [.name, .count, .avg_ms, .min_ms, .max_ms, .total_ms] | @tsv)'' | column -t -s $''\t'''

  perf:reset:
    desc: snapshot perf and then zero the counters — useful to bench a fresh slice of traffic
    vars:
      PORT:
        sh: cat /tmp/bleep-stats-dev.port 2>/dev/null || cat /tmp/bleep-stats.port 2>/dev/null || echo 9290
    cmds:
      - 'curl -s "http://127.0.0.1:{{.PORT}}/perf?reset=1" | jq -r ''(["name","count","avg_ms","min_ms","max_ms","total_ms"] | @tsv), (.[] | [.name, .count, .avg_ms, .min_ms, .max_ms, .total_ms] | @tsv)'' | column -t -s $''\t'''

  redact:
    desc: 'send a prompt through the gateway and show BEFORE/AFTER redaction. Usage: task redact -- "my AKIA... and email@x.com"'
    cmds:
      - ./test-redaction.sh {{.CLI_ARGS}}

  test:
    desc: run all tests
    cmds:
      - cargo test

  lint:
    desc: run clippy and fmt check
    cmds:
      - cargo clippy -- -D warnings
      - cargo fmt --check

  fmt:
    desc: format code
    cmds:
      - cargo fmt

  check:
    desc: lint + test
    deps: [ lint, test ]

  clean:
    desc: remove build artifacts
    cmds:
      - cargo clean

  install-hooks:
    desc: install cocogitto's commit-msg + pre-push hooks (run once after cloning the repo)
    cmds:
      - bash scripts/install-git-hooks.sh

  release:
    desc: explain the release pipeline (you don't run this manually — push to main fires it)
    cmds:
      - |
        cat <<'EOF'
        Release pipeline (cocogitto + GitHub Actions):

          1. Write conventional commits:
               feat: <subject>          → MINOR bump (0.1.0 → 0.2.0)
               fix: <subject>           → PATCH bump (0.1.0 → 0.1.1)
               perf: <subject>          → PATCH bump
               feat!: <subject>         → MAJOR bump (0.1.0 → 1.0.0)
               chore|docs|refactor|...  → no bump, no release

          2. Push to main. .github/workflows/release.yml will:
                cog check     — fail on any non-conventional commit
                cog bump --auto — pick next semver, edit Cargo.toml ×3,
                                  tauri.conf.json, Cargo.lock ×2,
                                  CHANGELOG.md, commit, tag

          3. The tag push triggers .github/workflows/build.yml which:
                builds bleep-gateway for aarch64 + x86_64 Darwin
                builds Bleep.app .tar.gz for each target
                publishes a GitHub Release with all artifacts + checksums.txt

        First-time setup (one shot per clone):
          task install-hooks    # local commit-msg + pre-push validation
        EOF

  install-local:
    desc: "build release artifacts + install to PROD locations exactly like the real installer (no GitHub download). Use PREFIX=/path to relocate, LAUNCH_AGENT=yes|no to skip the prompt, OPEN=1 to launch Bleep.app after install."
    vars:
      PREFIX: '{{.PREFIX | default (print .HOME "/.local")}}'
      ARCH:
        sh: uname -m | sed 's/arm64/aarch64/'
      TARGET: "{{.ARCH}}-apple-darwin"
      LAUNCH_AGENT: '{{.LAUNCH_AGENT | default "ask"}}'
      LA_FLAG:
        sh: |
          case "{{.LAUNCH_AGENT}}" in
            yes) echo "--launch-agent" ;;
            no)  echo "--no-launch-agent" ;;
            *)   echo "" ;;
          esac
      OPEN: '{{.OPEN | default "0"}}'
    cmds:
      # stop anything that could hold the binaries / app bundle open.
      # match BOTH the dev build path (target/.../bleep-gateway) AND the
      # installed location (~/.local/bin/bleep-gateway or /usr/local/bin/…).
      # the old `target/.*` pattern alone leaked the installed gateway, which
      # then served 404 on /stats/reset because it predated the endpoints.
      - pkill -f "target/.*/{{.MENUBAR}}( |$)" 2>/dev/null || true
      - pkill -f "target/.*/{{.BIN}}( |$)"     2>/dev/null || true
      - pkill -x "{{.BIN}}" 2>/dev/null || true
      - osascript -e 'tell application "Bleep" to quit' 2>/dev/null || true
      - sleep 0.3
      # last-resort: anything still listening on the proxy port gets SIGKILL.
      - |
        for port in 9190 9390; do
          pid="$(lsof -ti tcp:$port 2>/dev/null | head -1)"
          if [ -n "$pid" ]; then
            echo "[task] port $port held by PID $pid after pkill — SIGKILL"
            kill -9 "$pid" 2>/dev/null || true
          fi
        done
      - rm -f /tmp/bleep-stats.port /tmp/bleep-events.port /tmp/bleep-stats-dev.port /tmp/bleep-events-dev.port
      # build + install via the real installer in --local mode
      - bash install.sh --local --prefix="{{.PREFIX}}" {{.LA_FLAG}}
      # optionally launch the freshly installed app
      - |
        if [ "{{.OPEN}}" = "1" ]; then
          for cand in /Applications/Bleep.app "$HOME/Applications/Bleep.app"; do
            if [ -d "$cand" ]; then
              echo "[task] opening $cand"
              open "$cand"
              break
            fi
          done
        fi

  install-local:uninstall:
    desc: remove the locally-installed Bleep (gateway, wrapper, cert, app bundle, LaunchAgent). Mirrors `install.sh --uninstall`.
    vars:
      PREFIX: '{{.PREFIX | default (print .HOME "/.local")}}'
    cmds:
      - osascript -e 'tell application "Bleep" to quit' 2>/dev/null || true
      - bash install.sh --uninstall --prefix="{{.PREFIX}}"

  test-installer:
    desc: run installer end-to-end smoke test against a synthetic local release
    cmds:
      - bash scripts/test-installer.sh

  eval:capture:
    desc: run gateway (release build) with request logging enabled for eval
    env:
      RUST_LOG: info
      BLEEP_LOG_REQUESTS: "1"
      BLEEP_LOG_PATH: /tmp
    cmds:
      - cargo run --release --bin {{.BIN}} -- {{.CLI_ARGS}}

  eval:
    desc: batch scan /tmp/bleep-requests.jsonl for missed redactions against combined.yaml
    cmds:
      - python3 scripts/eval-missed-redactions.py {{.CLI_ARGS}}

  eval:start:
    desc: start autonomous classifier daemon (tails log, classifies misses via haiku)
    cmds:
      - nohup python3 scripts/eval-classify.py --no-keywords {{.CLI_ARGS}} > /tmp/eval-classify.log 2>&1 &
      - sleep 1
      - python3 scripts/eval-classify.py --status

  eval:stop:
    desc: stop the running classifier daemon
    cmds:
      - python3 scripts/eval-classify.py --stop

  eval:status:
    desc: show classifier daemon state and lifetime counters
    cmds:
      - python3 scripts/eval-classify.py --status

  eval:replay:
    desc: scan existing log from the beginning then switch to tail mode
    cmds:
      - python3 scripts/eval-classify.py --replay --no-keywords {{.CLI_ARGS}}
