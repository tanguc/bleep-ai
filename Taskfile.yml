# https://taskfile.dev
version: "3"

vars:
  BIN: bleep-gateway
  TUI: bleep-tui

tasks:
  default:
    desc: list available tasks
    silent: true
    cmds:
      - task --list

  build:
    desc: build release binary
    sources:
      - src/**/*.rs
      - Cargo.toml
    generates:
      - target/release/{{.BIN}}
    cmds:
      - cargo build --release

  rules:
    desc: regenerate rules/combined.yaml from vendor sources
    sources:
      - rules/vendor/**/*
      - rules/EXCLUSIONS.yaml
      - src/rule_pipeline.rs
    generates:
      - rules/combined.yaml
      - rules/patterns-test-fixtures.yaml
    cmds:
      - cargo run --bin build-rules

  rules:dev:
    desc: regenerate rules with a small subset (fast proxy startup for iteration)
    cmds:
      - cargo run --bin build-rules -- --limit 30

  run:
    desc: run gateway (debug build)
    env:
      RUST_LOG: debug
      BLEEP_LOG_REQUESTS: "1"
      BLEEP_LOG_PATH: /tmp
    cmds:
      - cargo run --bin {{.BIN}} -- {{.CLI_ARGS}}

  run:release:
    desc: run gateway (release build)
    env:
      RUST_LOG: info
    cmds:
      - cargo run --release --bin {{.BIN}} -- {{.CLI_ARGS}}

  tui:
    desc: run the TUI monitor
    cmds:
      - cargo run --bin {{.TUI}}

  test:
    desc: run all tests
    cmds:
      - cargo test

  lint:
    desc: run clippy and fmt check
    cmds:
      - cargo clippy -- -D warnings
      - cargo fmt --check

  fmt:
    desc: format code
    cmds:
      - cargo fmt

  check:
    desc: lint + test
    deps: [ lint, test ]

  clean:
    desc: remove build artifacts
    cmds:
      - cargo clean

  install-hooks:
    desc: install cocogitto's commit-msg + pre-push hooks (run once after cloning the repo)
    cmds:
      - bash scripts/install-git-hooks.sh

  release:
    desc: explain the release pipeline (you don't run this manually — push to main fires it)
    cmds:
      - |
        cat <<'EOF'
        Release pipeline (cocogitto + GitHub Actions):

          1. Write conventional commits:
               feat: <subject>          → MINOR bump (0.1.0 → 0.2.0)
               fix: <subject>           → PATCH bump (0.1.0 → 0.1.1)
               perf: <subject>          → PATCH bump
               feat!: <subject>         → MAJOR bump (0.1.0 → 1.0.0)
               chore|docs|refactor|...  → no bump, no release

          2. Push to main. .github/workflows/release.yml will:
                cog check     — fail on any non-conventional commit
                cog bump --auto — pick next semver, edit Cargo.toml ×3,
                                  tauri.conf.json, Cargo.lock ×2,
                                  CHANGELOG.md, commit, tag

          3. The tag push triggers .github/workflows/build.yml which:
                builds bleep-gateway for aarch64 + x86_64 Darwin
                builds Bleep.app .tar.gz for each target
                publishes a GitHub Release with all artifacts + checksums.txt

        First-time setup (one shot per clone):
          task install-hooks    # local commit-msg + pre-push validation
        EOF

  install-local:
    desc: build from source and install bleep-gateway + Bleep.app locally (no GitHub release needed)
    vars:
      PREFIX: '{{.PREFIX | default (print .HOME "/.local")}}'
      ARCH:
        sh: uname -m | sed 's/arm64/aarch64/'
      TARGET: "{{.ARCH}}-apple-darwin"
    cmds:
      - bash install.sh --local --prefix="{{.PREFIX}}"

  test-installer:
    desc: run installer end-to-end smoke test against a synthetic local release
    cmds:
      - bash scripts/test-installer.sh

  eval:capture:
    desc: run gateway (release build) with request logging enabled for eval
    env:
      RUST_LOG: info
      BLEEP_LOG_REQUESTS: "1"
      BLEEP_LOG_PATH: /tmp
    cmds:
      - cargo run --release --bin {{.BIN}} -- {{.CLI_ARGS}}

  eval:
    desc: scan /tmp/all_requests.jsonl for missed redactions against combined.yaml
    cmds:
      - python3 scripts/eval-missed-redactions.py {{.CLI_ARGS}}
