# https://taskfile.dev
version: "3"

vars:
  BIN: bleep-gateway
  TUI: bleep-tui

tasks:
  default:
    desc: list available tasks
    silent: true
    cmds:
      - task --list

  build:
    desc: build release binary
    sources:
      - src/**/*.rs
      - Cargo.toml
    generates:
      - target/release/{{.BIN}}
    cmds:
      - cargo build --release

  rules:
    desc: regenerate rules/combined.yaml from vendor sources
    sources:
      - rules/vendor/**/*
      - rules/EXCLUSIONS.yaml
      - src/rule_pipeline.rs
    generates:
      - rules/combined.yaml
      - rules/patterns-test-fixtures.yaml
    cmds:
      - cargo run --bin build-rules

  rules:dev:
    desc: regenerate rules with a small subset (fast proxy startup for iteration)
    cmds:
      - cargo run --bin build-rules -- --limit 30

  run:
    desc: run gateway (debug build)
    env:
      RUST_LOG: debug
      BLEEP_LOG_REQUESTS: "1"
      BLEEP_LOG_PATH: /tmp
    cmds:
      - cargo run --bin {{.BIN}} -- {{.CLI_ARGS}}

  run:release:
    desc: run gateway (release build)
    env:
      RUST_LOG: info
    cmds:
      - cargo run --release --bin {{.BIN}} -- {{.CLI_ARGS}}

  tui:
    desc: run the TUI monitor
    cmds:
      - cargo run --bin {{.TUI}}

  test:
    desc: run all tests
    cmds:
      - cargo test

  lint:
    desc: run clippy and fmt check
    cmds:
      - cargo clippy -- -D warnings
      - cargo fmt --check

  fmt:
    desc: format code
    cmds:
      - cargo fmt

  check:
    desc: lint + test
    deps: [ lint, test ]

  clean:
    desc: remove build artifacts
    cmds:
      - cargo clean

  release:
    desc: print the manual release procedure (CI does the heavy lifting)
    cmds:
      - |
        cat <<'EOF'
        Release procedure:
          1. Update Cargo.toml `version` if you want it to match the tag.
          2. Commit + push to main.
          3. git tag vX.Y.Z && git push --tags
          4. GitHub Actions builds + uploads draft release with 4 archives + checksums.txt.
          5. Smoke-test: download install.sh from the draft release tree and run it on a clean macOS user.
          6. Promote the draft to a published release via GitHub UI when satisfied.
        EOF

  install-local:
    desc: build from source and install bleep-gateway + Bleep.app locally (no GitHub release needed)
    vars:
      PREFIX: '{{.PREFIX | default (print .HOME "/.local")}}'
      ARCH:
        sh: uname -m | sed 's/arm64/aarch64/'
      TARGET: "{{.ARCH}}-apple-darwin"
      APP_DEST: '{{if (stat "/Applications")}}{{if (isDir "/Applications")}}/Applications{{else}}{{.HOME}}/Applications{{end}}{{else}}{{.HOME}}/Applications{{end}}'
    cmds:
      - echo "[install-local] building bleep-gateway (release)..."
      - cargo build --release --bin bleep-gateway
      - echo "[install-local] building Bleep.app..."
      - cd apps/menu-bar/src-tauri && cargo tauri build --target {{.TARGET}}
      - echo "[install-local] installing gateway to {{.PREFIX}}..."
      - mkdir -p "{{.PREFIX}}/bin" "{{.PREFIX}}/lib/bleep/src"
      - cp target/release/bleep-gateway "{{.PREFIX}}/bin/bleep-gateway"
      - cp claude-wrapper.sh "{{.PREFIX}}/lib/bleep/bleep-wrapper.sh"
      - chmod +x "{{.PREFIX}}/lib/bleep/bleep-wrapper.sh"
      - bash scripts/extract-cert.sh "{{.PREFIX}}/lib/bleep/src"
      - ln -sf "{{.PREFIX}}/lib/bleep/bleep-wrapper.sh" "{{.PREFIX}}/bin/bleep"
      - echo "[install-local] installing Bleep.app..."
      - mkdir -p "{{.HOME}}/Applications"
      - cp -R "apps/menu-bar/src-tauri/target/{{.TARGET}}/release/bundle/macos/Bleep.app" "{{.HOME}}/Applications/"
      - xattr -r -d com.apple.quarantine "{{.HOME}}/Applications/Bleep.app" 2>/dev/null || true
      - codesign --force --deep -s - "{{.HOME}}/Applications/Bleep.app" 2>/dev/null || true
      - echo "[install-local] done."
      - echo "  bleep      -> {{.PREFIX}}/bin/bleep"
      - echo "  gateway    -> {{.PREFIX}}/bin/bleep-gateway"
      - echo "  Bleep.app  -> {{.HOME}}/Applications/Bleep.app"
      - echo "Make sure {{.PREFIX}}/bin is on your PATH."

  test-installer:
    desc: run installer end-to-end smoke test against a synthetic local release
    cmds:
      - bash scripts/test-installer.sh
