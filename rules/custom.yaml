    keywords: ["discord", "bot"]
    entropy: null
    tags: ["custom"]
    checksum_type: null
    replacement_type: faker_jwt
    description: "Discord bot token (3 base64-ish segments separated by dots)"
    severity: high

  - id: secret.telegram-bot-token
    name: Telegram Bot Token
    category: secret
    subcategory: telegram
    source: custom
    confidence: high
    regex: '\b[0-9]{8,12}:[A-Za-z0-9_\-]{30,}\b'
    keywords: ["telegram"]
    entropy: null
    tags: ["custom"]
    checksum_type: null
    replacement_type: faker_api_key
    description: "Telegram bot API token"
    severity: high

  - id: secret.twilio-account-sid
    name: Twilio Account SID
    category: secret
    subcategory: twilio
    source: custom
    confidence: high
    regex: '\bAC[a-f0-9]{32}\b'
    keywords: ["twilio"]
    entropy: null
    tags: ["custom"]
    checksum_type: null
    replacement_type: faker_api_key
