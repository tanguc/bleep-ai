# Custom (project-local) rules — augment vendored gitleaks/nosey-parker/spdb.
# Read by `cargo run --bin build-rules` (rule_pipeline.rs) and merged into
# rules/combined.yaml. IDs are auto-prefixed with `custom.` so they can't
# collide with upstream-derived rules.
#
# Schema: same as rules/vendor/hand-authored/patterns.yaml (see
# docs/schema/INTERNAL-SCHEMA.md). Required fields:
#   id, name, category (secret|pii|infra), subcategory, confidence,
#   regex, replacement_type, severity.
# Valid replacement_types: faker_email, faker_phone, faker_ssn, faker_cc_luhn,
#   faker_iban, faker_uuid, faker_ipv4, faker_aws_key, faker_github_pat,
#   faker_jwt, faker_api_key, faker_db_conn, faker_url_cred, fpe_numeric,
#   generic_random, passthrough.

rules:
  # ──────────────────────────────────────────────────────────────────────
  # AI providers
  # ──────────────────────────────────────────────────────────────────────

  - id: secret.anthropic-api-key
    name: Anthropic API Key
    category: secret
    subcategory: anthropic
    source: custom
    confidence: high
    regex: '\bsk-ant-api03-[A-Za-z0-9_\-]{80,200}\b'
    keywords: ["anthropic", "sk-ant"]
    entropy: null
    tags: ["custom"]
    checksum_type: null
    replacement_type: faker_api_key
    description: "Anthropic API key (sk-ant-api03-… variable length)"
    severity: high

  - id: secret.openai-proj-key
    name: OpenAI Project API Key
    category: secret
    subcategory: openai
    source: custom
    confidence: high
