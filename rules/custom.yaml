  # ──────────────────────────────────────────────────────────────────────
  # Monitoring / observability
  # ──────────────────────────────────────────────────────────────────────

  - id: secret.sentry-dsn
    name: Sentry DSN
    category: secret
    subcategory: sentry
    source: custom
    confidence: high
    regex: 'https://[a-f0-9]{32}@[a-z0-9.\-]+\.ingest\.sentry\.io/[0-9]+'
    keywords: ["sentry", "ingest"]
    entropy: null
    tags: ["custom"]
    checksum_type: null
    replacement_type: faker_url_cred
    description: "Sentry DSN containing public key"
    severity: medium

  - id: secret.newrelic-license
    name: New Relic License Key
    category: secret
    subcategory: newrelic
    source: custom
    confidence: medium
    regex: '\b[A-Za-z0-9]{36}NRAL\b'
    keywords: ["new relic", "newrelic", "NRAL"]
    entropy: null
    tags: ["custom"]
    checksum_type: null
    replacement_type: faker_api_key
    description: "New Relic license key (40 chars ending NRAL)"
    severity: high

  # ──────────────────────────────────────────────────────────────────────
  # Databases — connection strings with embedded credentials
  # ──────────────────────────────────────────────────────────────────────

  - id: secret.mongodb-srv-uri
    name: MongoDB SRV URI
    category: secret
    subcategory: mongodb
    source: custom
    confidence: high
    regex: 'mongodb(?:\+srv)?://[^:\s]+:[^@\s]+@[a-zA-Z0-9.\-]+'
    keywords: ["mongodb", "mongodb+srv"]
    entropy: null
    tags: ["custom"]
    checksum_type: null
    replacement_type: faker_db_conn
    description: "MongoDB connection string with credentials"
    severity: high

  - id: secret.redis-uri
    name: Redis URI with Credentials
    category: secret
    subcategory: redis
    source: custom
    confidence: medium
    regex: 'redis(?:s|://):[^@\s]+@[a-zA-Z0-9.\-]+'
    keywords: ["redis"]
    entropy: null
    tags: ["custom"]
    checksum_type: null
    replacement_type: faker_db_conn
    description: "Redis URL with embedded password"
    severity: high

  # ──────────────────────────────────────────────────────────────────────
  # PII — credit cards (with separators), phones (international), Luhn-less IBANs
  # ──────────────────────────────────────────────────────────────────────

  - id: pii.cc-spaced
    name: Credit Card (with separators)
    category: pii
    subcategory: cc
    source: custom
    confidence: medium
    regex: '\b(?:4[0-9]{3}[ -]?[0-9]{4}[ -]?[0-9]{4}[ -]?[0-9]{4}|[25][1-7][0-9]{2}[ -]?[0-9]{4}[ -]?[0-9]{4}[ -]?[0-9]{4}|3[47][0-9]{2}[ -]?[0-9]{6}[ -]?[0-9]{5}|6011[ -]?[0-9]{4}[ -]?[0-9]{4}[ -]?[0-9]{4})\b'
    keywords: ["card", "visa", "mastercard", "amex", "discover"]
    entropy: null
    tags: ["custom"]
    checksum_type: null
    replacement_type: faker_cc_luhn
    description: "Credit card numbers allowing space or dash separators"
    severity: medium

  - id: pii.phone-international
    name: International Phone Number
    category: pii
    subcategory: phone
    source: custom
    confidence: medium
    regex: '\+(?:[0-9][ \-.()]?){7,15}\b'
    keywords: ["phone", "tel", "mobile"]
    entropy: null
    tags: ["custom"]
    checksum_type: null
    replacement_type: faker_phone
    description: "International phone number, leading + then 7-15 digits with optional separators"
    severity: low

  - id: pii.iban-generic
    name: IBAN (generic, with optional spaces)
    category: pii
    subcategory: iban
    source: custom
    confidence: medium
    regex: '\b[A-Z]{2}[0-9]{2}(?:[ ]?[A-Z0-9]{4}){3,7}(?:[ ]?[A-Z0-9]{1,4})?\b'
    keywords: ["iban"]
    entropy: null
    tags: ["custom"]
    checksum_type: null
    replacement_type: faker_iban
    description: "IBAN with country code + check digits + 4-char groups (allows internal spaces)"
    severity: medium

  # ──────────────────────────────────────────────────────────────────────
  # PII — government IDs (US passport, EIN, ITIN; non-US not yet covered by ha.*)
  # ──────────────────────────────────────────────────────────────────────

  - id: pii.us-passport
    name: US Passport Number
    category: pii
    subcategory: us-passport
    source: custom
    confidence: medium
    regex: '\b[A-Z][0-9]{8}\b'
    keywords: ["passport"]
    entropy: null
    tags: ["custom"]
    checksum_type: null
    replacement_type: generic_random
    description: "US passport number (1 letter + 8 digits, format-match only)"
    severity: medium

  - id: pii.us-ein
    name: US Employer EIN
    category: pii
    subcategory: us-ein
    source: custom
    confidence: medium
    regex: '\b[0-9]{2}-[0-9]{7}\b'
    keywords: ["ein", "employer"]
    entropy: null
    tags: ["custom"]
    checksum_type: null
    replacement_type: fpe_numeric
    description: "US Employer Identification Number"
    severity: low

  # ──────────────────────────────────────────────────────────────────────
  # Crypto wallets
  # ──────────────────────────────────────────────────────────────────────

  - id: secret.eth-private-key
    name: Ethereum Private Key
    category: secret
    subcategory: eth
    source: custom
    confidence: high
    regex: '\b0x[a-fA-F0-9]{64}\b'
    keywords: ["ethereum", "eth", "private"]
    entropy: null
    tags: ["custom"]
    checksum_type: null
    replacement_type: generic_random
    description: "Ethereum private key (0x + 64 hex)"
    severity: high

  - id: pii.btc-wallet
    name: Bitcoin Wallet Address
    category: pii
    subcategory: btc
    source: custom
    confidence: medium
    regex: '\b(?:[13][a-km-zA-HJ-NP-Z1-9]{25,34}|bc1[a-z0-9]{20,80})\b'
    keywords: ["bitcoin", "btc", "wallet"]
    entropy: null
    tags: ["custom"]
    checksum_type: null
    replacement_type: generic_random
    description: "Bitcoin address (legacy or bech32 SegWit)"
    severity: medium
