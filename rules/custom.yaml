  # ──────────────────────────────────────────────────────────────────────
  # Communications — Slack, Discord, Telegram, Twilio, SendGrid, etc.
  # ──────────────────────────────────────────────────────────────────────

  - id: secret.slack-bot-token
    name: Slack Bot Token (xoxb)
    category: secret
    subcategory: slack
    source: custom
    confidence: high
    regex: '\bxoxb-[A-Za-z0-9\-]{20,}\b'
    keywords: ["slack", "xoxb"]
    entropy: null
    tags: ["custom"]
    checksum_type: null
    replacement_type: faker_api_key
