    severity: high

  - id: secret.slack-user-token
    name: Slack User Token (xoxp)
    category: secret
    subcategory: slack
    source: custom
    confidence: high
    regex: '\bxoxp-[A-Za-z0-9\-]{20,}\b'
    keywords: ["slack", "xoxp"]
    entropy: null
    tags: ["custom"]
