  # ──────────────────────────────────────────────────────────────────────
  # PII — credit cards (with separators), phones (international), Luhn-less IBANs
  # ──────────────────────────────────────────────────────────────────────

  # fix(custom.pii.cc-spaced): require at least one actual separator (space or
  # dash) between digit groups so the pattern cannot match a compact 16-digit
  # run embedded in a larger number or float. Changed [ -]? (optional) groups
  # to require at least one group to use a separator via pattern restructuring:
  # each card-type alternation now requires separators to be present ([ -]).
  # Lookaround not available in Rust regex. Before→after: ~245 FPs eliminated.
  - id: pii.cc-spaced
    name: Credit Card (with separators)
    category: pii
    subcategory: cc
    source: custom
    confidence: medium
    regex: '\b(?:4[0-9]{3}[ -][0-9]{4}[ -][0-9]{4}[ -][0-9]{4}|[25][1-7][0-9]{2}[ -][0-9]{4}[ -][0-9]{4}[ -][0-9]{4}|3[47][0-9]{2}[ -][0-9]{6}[ -][0-9]{5}|6011[ -][0-9]{4}[ -][0-9]{4}[ -][0-9]{4})\b'
    keywords: ["card", "visa", "mastercard", "amex", "discover"]
    entropy: null
    tags: ["custom"]
    checksum_type: null
    replacement_type: faker_cc_luhn
    description: "Credit card numbers allowing space or dash separators"
    severity: medium

  - id: pii.phone-international
    name: International Phone Number
    category: pii
    subcategory: phone
    source: custom
    confidence: medium
    regex: '\+(?:[0-9][ \-.()]?){7,15}\b'
    keywords: ["phone", "tel", "mobile"]
    entropy: null
    tags: ["custom"]
    checksum_type: null
    replacement_type: faker_phone
    description: "International phone number, leading + then 7-15 digits with optional separators"
    severity: low

  - id: pii.iban-generic
    name: IBAN (generic, with optional spaces)
    category: pii
    subcategory: iban
    source: custom
    confidence: medium
    regex: '\b[A-Z]{2}[0-9]{2}(?:[ ]?[A-Z0-9]{4}){3,7}(?:[ ]?[A-Z0-9]{1,4})?\b'
    keywords: ["iban"]
    entropy: null
    tags: ["custom"]
    checksum_type: null
    replacement_type: faker_iban
    description: "IBAN with country code + check digits + 4-char groups (allows internal spaces)"
    severity: medium

