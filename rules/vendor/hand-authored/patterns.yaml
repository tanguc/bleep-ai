# Hand-authored patterns — not present in any vendored source.
# DO NOT EDIT — see docs/schema/INTERNAL-SCHEMA.md for field docs.
rules:
  - id: ha.pii.uk-nin
    name: UK National Insurance Number
    category: pii
    subcategory: uk-nin
    source: hand-authored
    confidence: low
    regex: '\b[A-CEGHJ-PR-TW-Z]{1}[A-CEGHJ-NPR-TW-Z]{1}[0-9]{6}[A-D]{1}\b'
    keywords: []
    entropy: null
    tags: ["hand-authored"]
    checksum_type: null
    replacement_type: generic_random
    description: "UK National Insurance Number (format-match only, no check-digit)"
    severity: medium

  - id: ha.pii.pl-pesel
    name: Polish PESEL Number
    category: pii
    subcategory: pl-pesel
    source: hand-authored
    confidence: low
    regex: '\b[0-9]{2}[0-9]{2}[0-9]{2}[0-9]{5}\b'
    keywords: ["pesel"]
    entropy: null
    tags: ["hand-authored"]
    checksum_type: null
    replacement_type: generic_random
    description: "Polish PESEL national ID (11 digits, format-match only)"
    severity: medium

  - id: ha.pii.fr-insee
    name: French INSEE Number
    category: pii
    subcategory: fr-insee
    source: hand-authored
    confidence: low
    regex: '\b[12][0-9]{2}(0[1-9]|[1-9][0-9])(2[AB]|[0-9]{2})[0-9]{3}[0-9]{3}[0-9]{2}\b'
    keywords: ["insee", "secu"]
    entropy: null
    tags: ["hand-authored"]
    checksum_type: null
    replacement_type: generic_random
    description: "French INSEE/NIR social security number (15 digits, format-match only)"
    severity: medium

  - id: ha.pii.de-taxid
    name: German Tax ID (Steueridentifikationsnummer)
    category: pii
    subcategory: de-taxid
    source: hand-authored
    confidence: low
    regex: '\b[1-9][0-9]{10}\b'
    keywords: ["steueridentifikationsnummer", "steuer-id"]
    entropy: null
    tags: ["hand-authored"]
    checksum_type: null
    replacement_type: generic_random
    description: "German Steueridentifikationsnummer (11 digits, format-match only)"
    severity: medium

  - id: ha.secret.ibm-cloud-iam
    name: IBM Cloud IAM Token
    category: secret
    subcategory: generic
    source: hand-authored
    confidence: low
    regex: '\b[A-Za-z0-9_-]{44}\b'
    keywords: ["ibm", "iam_apikey", "ibmcloud"]
    entropy: null
    tags: ["hand-authored"]
    checksum_type: null
    replacement_type: faker_api_key
    description: "IBM Cloud IAM token (44-char alphanumeric, confidence low until format verified)"
    severity: medium
